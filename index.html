<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة البث المباشر الاحترافية | IPTV</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-card: #1f2937;
            --bg-sidebar: #0f172a;
            --accent-purple: #4f46e5;
            --text-light: #e2e8f0;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-light);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* ------------------ شاشة تسجيل الدخول ------------------ */
        #login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-main);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .login-box {
            background-color: var(--bg-sidebar);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid #1e293b;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
        }

        .login-box h2 {
            color: #6366f1;
            margin-top: 0;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: right;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #334155;
            background-color: var(--bg-main);
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
            direction: ltr;
        }

        .input-group input:focus {
            border-color: var(--accent-purple);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background-color: var(--accent-purple);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }

        .login-btn:hover {
            background-color: #4338ca;
        }

        .login-btn:disabled {
            background-color: #475569;
            cursor: not-allowed;
        }

        /* ------------------ لوحة التحكم (الداشبورد) ------------------ */
        #dashboard-screen {
            display: none;
            width: 100%;
            height: 100%;
        }

        #sidebar {
            width: 260px;
            background-color: var(--bg-sidebar);
            border-left: 1px solid #1e293b;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sidebar-brand {
            font-size: 22px;
            font-weight: bold;
            color: #6366f1;
            text-align: center;
            margin-bottom: 30px;
        }

        .nav-btn {
            background-color: transparent;
            color: var(--text-light);
            border: none;
            padding: 12px 15px;
            border-radius: 8px;
            cursor: pointer;
            text-align: right;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
        }

        .nav-btn:hover, .nav-btn.active {
            background-color: var(--accent-purple);
        }

        .logout-btn {
            margin-top: auto;
            background-color: #991b1b;
        }

        #main-content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            position: relative;
        }

        .section-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            border-bottom: 1px solid #334155;
            padding-bottom: 8px;
            color: #38bdf8;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid #374151;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-purple);
        }

        .card-icon {
            font-size: 40px;
            margin-bottom: 10px;
            background: #111827;
            padding: 15px;
            border-radius: 8px;
            display: inline-block;
        }

        .card-title {
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .card-meta {
            font-size: 12px;
            color: var(--text-muted);
        }

        .content-block {
            display: none;
        }

        /* ------------------ مشغل الفيديو (نافذة منبثقة) ------------------ */
        #video-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        #video-container {
            width: 80%;
            max-width: 800px;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.5);
        }

        video {
            width: 100%;
            height: auto;
            display: block;
        }

        .close-video-btn {
            margin-bottom: 15px;
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            #dashboard-screen { flex-direction: column; }
            #sidebar { width: auto; height: auto; border-left: none; border-bottom: 1px solid #1e293b; }
            #main-content { padding: 15px; }
            #video-container { width: 95%; }
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>IPTV Web Hub</h2>
            <div class="input-group">
                <label>رابط السيرفر (Host/URL)</label>
                <input type="text" id="host-url" placeholder="http://example.com:8080">
            </div>
            <div class="input-group">
                <label>اسم المستخدم (Username)</label>
                <input type="text" id="username" placeholder="اكتب اسم المستخدم">
            </div>
            <div class="input-group">
                <label>كلمة المرور (Password)</label>
                <input type="password" id="password" placeholder="اكتب كلمة المرور">
            </div>
            <button class="login-btn" onclick="doLogin()">تسجيل الدخول</button>
            <p style="font-size: 12px; color: #64748b; margin-top: 15px;">اكتب "test" في كل الحقول لتجربة اللوحة مباشرة</p>
        </div>
    </div>

    <div id="video-modal">
        <button class="close-video-btn" onclick="closePlayer()">إغلاق الفيديو ❌</button>
        <div id="video-container">
            <video id="iptv-player" controls autoplay></video>
        </div>
    </div>

    <div id="dashboard-screen">
        <div id="sidebar">
            <div class="sidebar-brand">IPTV Web Hub</div>
            <button class="nav-btn active" onclick="showSection('live', this)">📺 القنوات الحرة</button>
            <button class="nav-btn" onclick="showSection('movies', this)">🎬 مكتبة الأفلام</button>
            <button class="nav-btn" onclick="showSection('series', this)">🍿 المسلسلات والفرسان</button>
            <button class="nav-btn logout-btn" onclick="doLogout()">🚪 تسجيل الخروج</button>
        </div>

        <div id="main-content">
            <div id="live" class="content-block" style="display: block;">
                <div class="section-title">📺 القنوات الرياضية الحية</div>
                <div class="grid-container">
                    <div class="card" onclick="playStream('https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8')">
                        <div class="card-icon">⚽</div>
                        <div class="card-title">beIN Sports HD (تجربة)</div>
                        <div class="card-meta">اضغط للتشغيل</div>
                    </div>
                    <div class="card" onclick="playStream('https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8')">
                        <div class="card-icon">🏆</div>
                        <div class="card-title">SSC Sports 1 (تجربة)</div>
                        <div class="card-meta">اضغط للتشغيل</div>
                    </div>
                </div>
            </div>

            <div id="movies" class="content-block">
                <div class="section-title">🎬 مكتبة الأفلام</div>
                <div class="grid-container">
                    <div class="card" onclick="playStream('https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8')">
                        <div class="card-icon" style="background: #3b0764;">🍿</div>
                        <div class="card-title">فيلم أكشن (تجربة)</div>
                        <div class="card-meta">اضغط للتشغيل</div>
                    </div>
                </div>
            </div>

            <div id="series" class="content-block">
                <div class="section-title">🍿 المسلسلات</div>
                <div class="grid-container">
                    <div class="card" onclick="playStream('https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8')">
                        <div class="card-icon" style="background: #1e3a8a;">🎬</div>
                        <div class="card-title">مسلسل (تجربة)</div>
                        <div class="card-meta">اضغط للتشغيل</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('dashboard-screen').style.display = 'none';
        var hlsPlayer = null; // متغير لمشغل الفيديو

        async function doLogin() {
            var host = document.getElementById('host-url').value.trim();
            var user = document.getElementById('username').value.trim();
            var pass = document.getElementById('password').value.trim();
            var loginBtn = document.querySelector('.login-btn');

            if(host === "" || user === "" || pass === "") {
                alert("الرجاء تعبئة جميع الحقول!");
                return;
            }

            if(host.toLowerCase() === "test" && user.toLowerCase() === "test" && pass.toLowerCase() === "test") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard-screen').style.display = 'flex';
                return;
            }

            if (host.endsWith('/')) {
                host = host.slice(0, -1);
            }

            loginBtn.innerText = "⏳ جاري التحميل...";
            loginBtn.disabled = true;

            try {
                let apiUrl = `${host}/player_api.php?username=${user}&password=${pass}`;
                let proxyUrl = `https://corsproxy.io/?${encodeURIComponent(apiUrl)}`;
                let response = await fetch(proxyUrl);
                
                if (!response.ok) throw new Error('السيرفر رفض الاتصال.');
                
                let data = await response.json();

                if (data.user_info && data.user_info.auth === 1) {
                    alert("✅ تم تسجيل الدخول بنجاح!");
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('dashboard-screen').style.display = 'flex';
                } else {
                    alert("❌ فشل تسجيل الدخول.");
                }
            } catch (error) {
                alert("⚠️ فشل الاتصال بالسيرفر! جرب وضع (test) للدخول.");
            } finally {
                loginBtn.innerText = "تسجيل الدخول";
                loginBtn.disabled = false;
            }
        }

        function doLogout() {
            document.getElementById('dashboard-screen').style.display = 'none';
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('host-url').value = '';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        }

        function showSection(sectionId, element) {
            var blocks = document.querySelectorAll('.content-block');
            blocks.forEach(function(block) { block.style.display = 'none'; });
            document.getElementById(sectionId).style.display = 'block';
            
            var buttons = document.querySelectorAll('.nav-btn');
            buttons.forEach(function(btn) { btn.classList.remove('active'); });
            element.classList.add('active');
        }

        /* ------------------ دوال تشغيل وإغلاق الفيديو ------------------ */
        function playStream(url) {
            var videoModal = document.getElementById('video-modal');
            var video = document.getElementById('iptv-player');
            
            // إظهار نافذة الفيديو
            videoModal.style.display = 'flex';

            // تدمير المشغل القديم إذا كان يعمل
            if (hlsPlayer) {
                hlsPlayer.destroy();
            }

            // تشغيل الرابط الجديد باستخدام مكتبة HLS.js
            if (Hls.isSupported()) {
                hlsPlayer = new Hls();
                hlsPlayer.loadSource(url);
                hlsPlayer.attachMedia(video);
                hlsPlayer.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play();
                });
            } 
            // دعم متصفحات سفاري للآيفون والماك
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('loadedmetadata', function() {
                    video.play();
                });
            }
        }

        function closePlayer() {
            var videoModal = document.getElementById('video-modal');
            var video = document.getElementById('iptv-player');
            
            // إيقاف الفيديو وإخفاء النافذة
            video.pause();
            video.src = "";
            videoModal.style.display = 'none';
            
            if (hlsPlayer) {
                hlsPlayer.destroy();
            }
        }
    </script>
</body>
</html>
